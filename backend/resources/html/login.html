<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Neuhen Sign In</title>
  <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1><span class="k">K</span>-NEUHEN</h1>
      <div class="subtitle">Return to the neon district.</div>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label>Email</label>
        <input type="text" name="email" id="email" placeholder="you@example.com" />
        <div class="error-text" id="email-error"></div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" />
        <div class="error-text" id="password-error"></div>
      </div>

      <button class="login-btn" type="submit">SIGN IN</button>

      <a class="google-btn" href="/auth/google">Continue with Google</a>
    </form>

    <div class="bottom-text">
      New here?
      <a href="/register">Create account</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("login-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      document.querySelectorAll(".error-text").forEach((el) => {
        el.innerText = "";
        el.classList.remove("active");
      });

      document.querySelectorAll("input").forEach((el) => el.classList.remove("input-error"));

      const formData = new FormData(form);
      const response = await fetch("/login", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (data.errors) {
        for (const field in data.errors) {
          const errorElement = document.getElementById(`${field}-error`);
          const inputElement = document.getElementById(field);

          if (errorElement) {
            errorElement.innerText = data.errors[field];
            errorElement.classList.add("active");
          }

          if (inputElement) {
            inputElement.classList.add("input-error");
          }
        }
        return;
      }

      window.location.href = "/login-success";
    });
  </script>
</body>
</html>

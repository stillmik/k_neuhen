<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Neuhen Register</title>

  <link rel="stylesheet" href="/static/css/register.css?v=20260605-1">

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>
  <main class="page">
    <section class="auth-card">

      <section class="auth-content">

        <section class="auth-header">

          <h1 class="auth-title">
            <span class="auth-title-white">CREATE</span>
            <span class="auth-title-accent">ACCOUNT</span>
          </h1>

          <p class="auth-subtitle">
            Join <span>K-Neuhen</span> and be part of the future.
          </p>

          <p class="auth-subtitle">
            Build your identity.
          </p>

        </section>

        <section class="auth-fields">

          <div class="fields-row">

            <div class="input-group">
              <label for="given-name" class="input-label">
                FIRST NAME
              </label>

              <div class="input-wrapper">
                <input id="given-name" name="given-name" type="text" autocomplete="given-name" placeholder="Sawyer"
                  class="auth-input">

                <i data-lucide="user" class="input-icon"></i>
              </div>
            </div>

            <div class="input-group">
              <label for="family-name" class="input-label">
                LAST NAME
              </label>

              <div class="input-wrapper">
                <input id="family-name" name="family-name" type="text" autocomplete="family-name" placeholder="Hero"
                  class="auth-input">

                <i data-lucide="user" class="input-icon"></i>
              </div>
            </div>

          </div>

        </section>

        <section class="auth-actions">
        </section>

        <section class="auth-footer">
        </section>

      </section>

    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>


</html>

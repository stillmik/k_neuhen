services:

  web-store:
    build: .
    
    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./.env

    depends_on:
      postgres:
        condition: service_healthy


  postgres:
    image: postgres:16

    container_name: k_neuhen_postgres

    restart: always

    env_file:
      - ./.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k_neuhen_user -d k_neuhen_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: